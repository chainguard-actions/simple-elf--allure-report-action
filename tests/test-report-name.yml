name: Test allure report with custom report name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create allure-results directory with a minimal test result
        run: |
          mkdir -p allure-results
          cat > allure-results/sample-result.json << 'EOF'
          {
            "uuid": "test-uuid-5678",
            "name": "Sample Test with Custom Name",
            "status": "passed",
            "stage": "finished",
            "start": 1700000000000,
            "stop": 1700000001000
          }
          EOF

      - name: Create gh-pages directory (simulating existing gh-pages branch)
        run: |
          mkdir -p gh-pages/last-history

      - id: action
        uses: .
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: '20'
          github_run_num: '42'
          github_run_id: '99999'
          github_repo: 'my-org/my-project'
          github_repo_owner: 'my-org'
          github_tests_repo: 'my-org/my-project'
          github_server_url: 'https://github.com'
          report_name: 'My Custom Allure Report'

      - name: Assert allure-report was generated
        run: |
          echo "Checking allure-report directory..."
          if [ ! -d "allure-report" ]; then
            echo "FAIL: allure-report directory was not created"
            exit 1
          fi
          echo "PASS: allure-report directory exists"

      - name: Assert allure-report contains index.html
        run: |
          echo "Checking allure-report/index.html..."
          if [ ! -f "allure-report/index.html" ]; then
            echo "FAIL: allure-report/index.html was not created"
            exit 1
          fi
          echo "PASS: allure-report/index.html exists"

      - name: Assert allure-history run folder was created
        run: |
          echo "Checking allure-history/42 directory..."
          if [ ! -d "allure-history/42" ]; then
            echo "FAIL: allure-history/42 directory was not created"
            exit 1
          fi
          echo "PASS: allure-history/42 directory exists"

      - name: Assert executor.json was created with custom report name
        run: |
          echo "Checking executor.json in allure-results..."
          EXECUTOR_FILE="allure-results/executor.json"
          if [ ! -f "$EXECUTOR_FILE" ]; then
            echo "FAIL: executor.json was not found in allure-results"
            exit 1
          fi
          CONTENT=$(cat "$EXECUTOR_FILE")
          echo "executor.json content: $CONTENT"
          if ! echo "$CONTENT" | grep -q "My Custom Allure Report"; then
            echo "FAIL: executor.json does not contain custom report name 'My Custom Allure Report'"
            exit 1
          fi
          echo "PASS: executor.json contains custom report name"

      - name: Assert allure-history index.html contains correct URL
        run: |
          echo "Checking allure-history/index.html..."
          if [ ! -f "allure-history/index.html" ]; then
            echo "FAIL: allure-history/index.html was not created"
            exit 1
          fi
          CONTENT=$(cat allure-history/index.html)
          echo "Content: $CONTENT"
          if ! echo "$CONTENT" | grep -q "my-org.github.io/my-project"; then
            echo "FAIL: index.html does not contain expected github.io URL"
            exit 1
          fi
          echo "PASS: allure-history/index.html contains expected URL"
